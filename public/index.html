<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrgChat — Secure Workplace Communication</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <div class="auth-bg">
    <div class="auth-blob b1"></div>
    <div class="auth-blob b2"></div>
  </div>

  <div class="auth-wrapper">
    <!-- Left branding panel -->
    <div class="auth-brand">
      <div class="brand-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">OrgChat</span>
      </div>
      <h1>Your workplace,<br/>connected.</h1>
      <p>A secure internal communication platform built for teams that mean business.</p>
      <ul class="brand-features">
        <li><span>🔒</span> Admin-approved access only</li>
        <li><span>💬</span> Department channels + direct messages</li>
        <li><span>⚡</span> Real-time collaboration</li>
        <li><span>🏢</span> Built for organizations</li>
      </ul>
    </div>

    <!-- Right form panel -->
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login', this)">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register', this)">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username or Email</label>
          <input type="text" id="loginUsername" placeholder="Enter username or email" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">
          <span>Sign In</span>
        </button>
        <p id="loginError" class="form-error"></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="John Doe" required/>
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="regUsername" placeholder="john_doe" required/>
          </div>
        </div>
        <div class="form-group">
          <label>Work Email</label>
          <input type="email" id="regEmail" placeholder="john@company.com" required/>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select id="regDepartment">
            <option value="General">General</option>
            <option value="Engineering">Engineering</option>
            <option value="Design">Design</option>
            <option value="Marketing">Marketing</option>
            <option value="Sales">Sales</option>
            <option value="HR">HR</option>
            <option value="Finance">Finance</option>
            <option value="Operations">Operations</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Create a strong password" required/>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">
          <span>Create Account</span>
        </button>
        <p id="registerError" class="form-error"></p>
        <p id="registerSuccess" class="form-success"></p>
      </form>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location.href = '/chat';

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
      document.getElementById(tab + 'Form').classList.remove('hidden');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.textContent = '';
      btn.classList.add('loading');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value
        })
      });

      const data = await res.json();
      btn.classList.remove('loading');

      if (!res.ok) { errEl.textContent = data.message; return; }

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/chat';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errEl = document.getElementById('registerError');
      const sucEl = document.getElementById('registerSuccess');
      errEl.textContent = '';
      sucEl.textContent = '';
      btn.classList.add('loading');

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('regName').value,
          username: document.getElementById('regUsername').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value,
          department: document.getElementById('regDepartment').value
        })
      });

      const data = await res.json();
      btn.classList.remove('loading');

      if (!res.ok) { errEl.textContent = data.message; return; }

      if (data.pending) {
        sucEl.textContent = data.message;
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/chat';
    }
  </script>
</body>
</html>
