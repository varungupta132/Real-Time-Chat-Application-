<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatApp</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;height:100vh;display:flex;overflow:hidden;}

    /* ── SIDEBAR ── */
    .sidebar{
      width:260px;min-width:260px;background:#16213e;
      display:flex;flex-direction:column;
      border-right:1px solid #0f3460;
    }
    .sidebar-header{
      padding:16px;border-bottom:1px solid #0f3460;
      display:flex;align-items:center;justify-content:space-between;
    }
    .sidebar-header h2{color:#e94560;font-size:18px;font-weight:800;}
    .me-badge{
      background:#0f3460;color:#ccd6f6;
      padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;
    }

    .sidebar-section{padding:12px 16px 4px;}
    .sidebar-section-title{
      color:#4a5568;font-size:11px;font-weight:700;
      text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
    }

    .chat-item{
      display:flex;align-items:center;gap:10px;
      padding:9px 12px;border-radius:8px;cursor:pointer;
      transition:background 0.15s;margin-bottom:2px;
      position:relative;
    }
    .chat-item:hover{background:#0f3460;}
    .chat-item.active{background:#e94560;}
    .chat-item.active .item-name{color:white;}
    .chat-item.active .item-sub{color:rgba(255,255,255,0.7);}

    .item-avatar{
      width:36px;height:36px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;color:white;flex-shrink:0;
    }
    .item-info{flex:1;min-width:0;}
    .item-name{color:#ccd6f6;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .item-sub{color:#4a5568;font-size:12px;margin-top:1px;}

    .unread-badge{
      background:#e94560;color:white;
      font-size:11px;font-weight:700;
      min-width:18px;height:18px;border-radius:9px;
      display:flex;align-items:center;justify-content:center;
      padding:0 5px;flex-shrink:0;
    }

    .online-dot{
      width:8px;height:8px;border-radius:50%;
      background:#10b981;flex-shrink:0;
    }

    .sidebar-footer{
      margin-top:auto;padding:12px 16px;
      border-top:1px solid #0f3460;
    }
    .logout-btn{
      width:100%;padding:9px;background:transparent;
      border:1px solid #e94560;color:#e94560;
      border-radius:8px;font-size:13px;font-weight:600;
      cursor:pointer;transition:all 0.2s;font-family:inherit;
    }
    .logout-btn:hover{background:#e94560;color:white;}

    /* ── MAIN ── */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;}

    .chat-header{
      height:60px;background:#16213e;
      border-bottom:1px solid #0f3460;
      display:flex;align-items:center;gap:12px;
      padding:0 20px;flex-shrink:0;
    }
    .chat-header-avatar{
      width:36px;height:36px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:700;color:white;
    }
    .chat-header-info{}
    .chat-header-name{color:#ccd6f6;font-size:16px;font-weight:700;}
    .chat-header-sub{color:#4a5568;font-size:12px;margin-top:1px;}

    /* Messages */
    .messages-wrap{
      flex:1;overflow-y:auto;padding:16px 20px;
      display:flex;flex-direction:column;gap:2px;
      background:#1a1a2e;
    }
    .messages-wrap::-webkit-scrollbar{width:5px;}
    .messages-wrap::-webkit-scrollbar-thumb{background:#0f3460;border-radius:3px;}

    .day-sep{text-align:center;margin:12px 0 6px;}
    .day-sep span{background:#16213e;color:#4a5568;font-size:11px;padding:3px 12px;border-radius:20px;}

    .msg{display:flex;gap:8px;padding:3px 6px;border-radius:8px;transition:background 0.1s;}
    .msg:hover{background:rgba(255,255,255,0.02);}
    .msg.mine{flex-direction:row-reverse;}

    .msg-avatar{
      width:34px;height:34px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;color:white;
      flex-shrink:0;align-self:flex-end;
    }
    .msg-body{max-width:62%;display:flex;flex-direction:column;gap:3px;}
    .msg.mine .msg-body{align-items:flex-end;}

    .msg-meta{display:flex;align-items:center;gap:6px;}
    .msg.mine .msg-meta{flex-direction:row-reverse;}
    .msg-user{font-size:12px;font-weight:700;color:#8892b0;}
    .msg-time{font-size:11px;color:#4a5568;}

    .msg-bubble{
      padding:9px 13px;border-radius:12px;
      font-size:14px;line-height:1.5;word-break:break-word;
    }
    .msg.mine .msg-bubble{background:#e94560;color:white;border-bottom-right-radius:3px;}
    .msg.theirs .msg-bubble{background:#16213e;color:#ccd6f6;border-bottom-left-radius:3px;}

    /* Empty */
    .empty-chat{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      color:#4a5568;gap:10px;
    }
    .empty-chat .icon{font-size:52px;}
    .empty-chat p{font-size:15px;}

    /* Input */
    .input-area{
      padding:14px 20px;background:#16213e;
      border-top:1px solid #0f3460;flex-shrink:0;
    }
    .input-row{
      display:flex;gap:8px;align-items:center;
      background:#0f3460;border-radius:10px;
      padding:5px 5px 5px 14px;
      border:2px solid transparent;transition:border-color 0.2s;
    }
    .input-row:focus-within{border-color:#e94560;}
    #msgInput{
      flex:1;background:transparent;border:none;
      color:white;font-size:14px;font-family:inherit;outline:none;padding:7px 0;
    }
    #msgInput::placeholder{color:#4a5568;}
    .send-btn{
      width:38px;height:38px;background:#e94560;border:none;
      border-radius:8px;color:white;font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.2s,transform 0.1s;flex-shrink:0;
    }
    .send-btn:hover{background:#c73652;}
    .send-btn:active{transform:scale(0.95);}

    /* No chat selected */
    .no-chat{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      color:#4a5568;gap:12px;
    }
    .no-chat .icon{font-size:64px;}
    .no-chat h3{font-size:20px;color:#8892b0;}
    .no-chat p{font-size:14px;}
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2>💬 ChatApp</h2>
    <span class="me-badge" id="meBadge">me</span>
  </div>

  <!-- Global Chat -->
  <div class="sidebar-section">
    <div class="sidebar-section-title">Channels</div>
    <div class="chat-item active" id="globalItem" onclick="openGlobal()">
      <div class="item-avatar" style="background:#e94560;font-size:18px;">🌐</div>
      <div class="item-info">
        <div class="item-name">Global Chat</div>
        <div class="item-sub">Everyone</div>
      </div>
      <span class="unread-badge" id="globalUnread" style="display:none">0</span>
    </div>
  </div>

  <!-- Direct Messages -->
  <div class="sidebar-section" style="flex:1;overflow-y:auto;">
    <div class="sidebar-section-title">Direct Messages</div>
    <div id="usersList">
      <div style="color:#4a5568;font-size:13px;padding:8px 4px;">Loading users...</div>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- MAIN AREA -->
<div class="main" id="mainArea">
  <!-- No chat selected -->
  <div class="no-chat" id="noChatState">
    <div class="icon">👈</div>
    <h3>Select a chat</h3>
    <p>Choose Global Chat or a person to start messaging</p>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const me = localStorage.getItem('username');
if (!token || !me) window.location.href = '/';

document.getElementById('meBadge').textContent = me;

// ── Colors ──────────────────────────────────────────────────
const COLORS = ['#e94560','#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#14b8a6','#f97316'];
const colorCache = {};
function getColor(name) {
  if (!colorCache[name]) {
    let n = 0; for (let i=0;i<name.length;i++) n+=name.charCodeAt(i);
    colorCache[name] = COLORS[n % COLORS.length];
  }
  return colorCache[name];
}
function initials(name) { return name.slice(0,2).toUpperCase(); }

// ── State ────────────────────────────────────────────────────
let activeRoom = null;   // 'global' or username
let lastTime = {};       // { roomKey: timestamp }
let pollTimer = null;
let usersRefreshTimer = null;
let allUsers = [];
let unreadCounts = {};   // { username: count }
let lastSeenTime = {};   // { username: timestamp } - when we last opened that DM

// ── Time helpers ─────────────────────────────────────────────
function fmtTime(d) {
  d = new Date(d);
  let h=d.getHours(), m=d.getMinutes();
  const ap = h>=12?'PM':'AM'; h=h%12||12;
  return h+':'+(m<10?'0'+m:m)+' '+ap;
}
function fmtDate(d) {
  d = new Date(d);
  const today=new Date(), yest=new Date(today);
  yest.setDate(yest.getDate()-1);
  if(d.toDateString()===today.toDateString()) return 'Today';
  if(d.toDateString()===yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Build chat UI ─────────────────────────────────────────────
function buildChatUI(title, subtitle, avatarColor, avatarContent) {
  const main = document.getElementById('mainArea');
  main.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-avatar" style="background:${avatarColor}">${avatarContent}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">${escHtml(title)}</div>
        <div class="chat-header-sub">${escHtml(subtitle)}</div>
      </div>
    </div>
    <div class="messages-wrap" id="msgsWrap">
      <div class="empty-chat" id="emptyChat">
        <div class="icon">💬</div>
        <p>No messages yet. Say something!</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="msgInput" placeholder="Message ${title}..." autocomplete="off" maxlength="1000">
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  `;
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('msgInput').focus();
}

// ── Render a single message ───────────────────────────────────
let lastRenderedDate = {};
function renderMsg(msg, roomKey) {
  const wrap = document.getElementById('msgsWrap');
  if (!wrap) return;

  // Remove empty state
  const empty = document.getElementById('emptyChat');
  if (empty) empty.remove();

  // Day separator
  const msgDate = fmtDate(msg.createdAt);
  if (msgDate !== lastRenderedDate[roomKey]) {
    lastRenderedDate[roomKey] = msgDate;
    const sep = document.createElement('div');
    sep.className = 'day-sep';
    sep.innerHTML = `<span>${msgDate}</span>`;
    wrap.appendChild(sep);
  }

  const isMine = msg.sender === me;
  const div = document.createElement('div');
  div.className = 'msg ' + (isMine ? 'mine' : 'theirs');
  div.innerHTML =
    `<div class="msg-avatar" style="background:${getColor(msg.sender)}">${initials(msg.sender)}</div>` +
    `<div class="msg-body">` +
      `<div class="msg-meta">` +
        `<span class="msg-user">${isMine ? 'You' : escHtml(msg.sender)}</span>` +
        `<span class="msg-time">${fmtTime(msg.createdAt)}</span>` +
      `</div>` +
      `<div class="msg-bubble">${escHtml(msg.text)}</div>` +
    `</div>`;
  wrap.appendChild(div);
}

function scrollDown() {
  const w = document.getElementById('msgsWrap');
  if (w) w.scrollTop = w.scrollHeight;
}

// ── Open Global Chat ──────────────────────────────────────────
async function openGlobal() {
  clearInterval(pollTimer);
  activeRoom = 'global';
  lastRenderedDate['global'] = null;

  // Sidebar active state
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  document.getElementById('globalItem').classList.add('active');

  buildChatUI('Global Chat', 'Everyone in the app', '#e94560', '🌐');

  // Load messages
  const msgs = await apiGet('/api/messages');
  if (Array.isArray(msgs)) {
    msgs.forEach(m => renderMsg(m, 'global'));
    if (msgs.length) lastTime['global'] = msgs[msgs.length-1].createdAt;
    scrollDown();
  }

  // Start polling
  pollTimer = setInterval(() => pollMessages('global'), 1500);
}

// ── Open DM ───────────────────────────────────────────────────
async function openDM(username) {
  clearInterval(pollTimer);
  activeRoom = username;
  lastRenderedDate[username] = null;

  // Mark as seen
  lastSeenTime[username] = new Date().toISOString();
  unreadCounts[username] = 0;
  updateUserBadge(username);

  // Sidebar active state
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('user_' + username);
  if (item) item.classList.add('active');

  buildChatUI(username, 'Direct Message', getColor(username), initials(username));

  // Load messages
  const msgs = await apiGet('/api/messages?with=' + encodeURIComponent(username));
  if (Array.isArray(msgs)) {
    msgs.forEach(m => renderMsg(m, username));
    if (msgs.length) lastTime[username] = msgs[msgs.length-1].createdAt;
    scrollDown();
  }

  // Start polling
  pollTimer = setInterval(() => pollMessages(username), 1500);
}

// ── Poll new messages ─────────────────────────────────────────
async function pollMessages(room) {
  if (activeRoom !== room) return;
  const since = lastTime[room];
  const url = room === 'global'
    ? '/api/messages/poll' + (since ? '?since=' + encodeURIComponent(since) : '')
    : '/api/messages/poll?with=' + encodeURIComponent(room) + (since ? '&since=' + encodeURIComponent(since) : '');

  const msgs = await apiGet(url);
  if (!Array.isArray(msgs) || !msgs.length) return;

  msgs.forEach(m => renderMsg(m, room));
  lastTime[room] = msgs[msgs.length-1].createdAt;
  scrollDown();
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msgInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text || !activeRoom) return;
  input.value = '';

  const body = activeRoom === 'global' ? { text } : { text, to: activeRoom };
  const msg = await apiPost('/api/messages', body);
  if (msg && msg._id) {
    renderMsg(msg, activeRoom);
    lastTime[activeRoom] = msg.createdAt;
    scrollDown();
  }
}

// ── Load users sidebar ────────────────────────────────────────
async function loadUsers() {
  const users = await apiGet('/api/users');
  if (!Array.isArray(users)) return;
  allUsers = users;
  renderUsersList();
}

function renderUsersList() {
  const list = document.getElementById('usersList');
  if (!list) return;

  if (!allUsers.length) {
    list.innerHTML = '<div style="color:#4a5568;font-size:13px;padding:8px 4px;">No other users yet</div>';
    return;
  }

  list.innerHTML = '';
  allUsers.forEach(u => {
    const unread = unreadCounts[u.username] || 0;
    const isActive = activeRoom === u.username;
    const div = document.createElement('div');
    div.className = 'chat-item' + (isActive ? ' active' : '');
    div.id = 'user_' + u.username;
    div.onclick = () => openDM(u.username);
    div.innerHTML =
      `<div class="item-avatar" style="background:${getColor(u.username)}">${initials(u.username)}</div>` +
      `<div class="item-info">` +
        `<div class="item-name">${escHtml(u.username)}</div>` +
        `<div class="item-sub">Click to chat</div>` +
      `</div>` +
      `<span class="unread-badge" id="badge_${u.username}" style="display:${unread>0?'flex':'none'}">${unread}</span>`;
    list.appendChild(div);
  });
}

function updateUserBadge(username) {
  const badge = document.getElementById('badge_' + username);
  if (!badge) return;
  const count = unreadCounts[username] || 0;
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';
}

// Poll for unread DM counts (background)
async function pollUnread() {
  if (!allUsers.length) return;
  for (const u of allUsers) {
    if (activeRoom === u.username) continue; // skip current chat
    const since = lastSeenTime[u.username] || lastTime[u.username];
    const url = '/api/messages/poll?with=' + encodeURIComponent(u.username) +
      (since ? '&since=' + encodeURIComponent(since) : '');
    const msgs = await apiGet(url);
    if (Array.isArray(msgs) && msgs.length) {
      const newFromThem = msgs.filter(m => m.sender !== me);
      if (newFromThem.length) {
        unreadCounts[u.username] = (unreadCounts[u.username] || 0) + newFromThem.length;
        lastTime[u.username] = msgs[msgs.length-1].createdAt;
        updateUserBadge(u.username);
      }
    }
  }
}

// ── API helpers ───────────────────────────────────────────────
async function apiGet(url) {
  try {
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { logout(); return null; }
    return await res.json();
  } catch { return null; }
}

async function apiPost(url, body) {
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify(body)
    });
    if (res.status === 401) { logout(); return null; }
    return await res.json();
  } catch { return null; }
}

function logout() {
  clearInterval(pollTimer);
  clearInterval(usersRefreshTimer);
  localStorage.clear();
  window.location.href = '/';
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await loadUsers();
  openGlobal();
  // Refresh users list every 10s (to show new users)
  usersRefreshTimer = setInterval(async () => {
    await loadUsers();
    await pollUnread();
  }, 5000);
}

init();
</script>
</body>
</html>
