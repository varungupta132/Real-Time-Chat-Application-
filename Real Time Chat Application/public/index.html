<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 32px;
      color: #e94560;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo p {
      color: #8892b0;
      margin-top: 6px;
      font-size: 14px;
    }

    .tabs {
      display: flex;
      background: #0f3460;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: #8892b0;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tab.active {
      background: #e94560;
      color: white;
    }

    .form { display: none; }
    .form.active { display: block; }

    .input-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      color: #8892b0;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #e94560;
    }

    input::placeholder { color: #4a5568; }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }

    button[type="submit"]:hover { background: #c73652; }
    button[type="submit"]:active { transform: scale(0.98); }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.error { background: rgba(233,69,96,0.15); color: #e94560; border: 1px solid rgba(233,69,96,0.3); }
    .alert.success { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .alert.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>💬 ChatApp</h1>
      <p>Simple real-time group chat</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Login -->
    <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="off">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit">Login →</button>
    </form>

    <!-- Register -->
    <form id="registerForm" class="form" onsubmit="handleRegister(event)">
      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required autocomplete="off">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 4 characters" required minlength="4">
      </div>
      <button type="submit">Create Account →</button>
    </form>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = '/chat';

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
      hideAlert();
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type + ' show';
    }

    function hideAlert() {
      document.getElementById('alert').className = 'alert';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const f = e.target;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: f.username.value, password: f.password.value })
        });
        const data = await res.json();
        if (!res.ok) return showAlert(data.message, 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/chat';
      } catch {
        showAlert('Network error. Try again.', 'error');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const f = e.target;
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: f.username.value, password: f.password.value })
        });
        const data = await res.json();
        if (!res.ok) return showAlert(data.message, 'error');
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/chat';
      } catch {
        showAlert('Network error. Try again.', 'error');
      }
    }
  </script>
</body>
</html>
